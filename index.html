<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stadtwerke & Kommunen Kontaktdaten</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 40px 20px;
            color: #1a1a1a;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
            color: #000;
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: #666;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: 2px solid #000;
            background: white;
            color: #000;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
            border-radius: 4px;
        }
        
        .btn:hover {
            background: #000;
            color: white;
        }
        
        .btn.active {
            background: #000;
            color: white;
        }
        
        /* Card View */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        
        .card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 24px;
            transition: all 0.3s;
        }
        
        .card:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        
        .card-header {
            border-bottom: 2px solid #000;
            padding-bottom: 12px;
            margin-bottom: 16px;
        }
        
        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #000;
            margin-bottom: 4px;
        }
        
        .card-type {
            display: inline-block;
            padding: 4px 12px;
            background: #f0f0f0;
            color: #333;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .card-info {
            margin-bottom: 12px;
        }
        
        .card-label {
            font-weight: 600;
            color: #666;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 4px;
        }
        
        .card-value {
            color: #1a1a1a;
            font-size: 0.95rem;
        }
        
        .card-value a {
            color: #000;
            text-decoration: none;
            border-bottom: 1px solid #ccc;
            transition: border-color 0.2s;
        }
        
        .card-value a:hover {
            border-bottom-color: #000;
        }
        
        /* Table View */
        .table-container {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: #000;
            color: white;
        }
        
        th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        tbody tr:hover {
            background: #fafafa;
        }
        
        tbody tr:last-child td {
            border-bottom: none;
        }
        
        .type-badge {
            display: inline-block;
            padding: 4px 10px;
            background: #f0f0f0;
            color: #333;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 4px;
            text-transform: uppercase;
        }
        
        table a {
            color: #000;
            text-decoration: none;
            border-bottom: 1px solid #ccc;
        }
        
        table a:hover {
            border-bottom-color: #000;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .card-grid {
                grid-template-columns: 1fr;
            }
            
            .table-container {
                overflow-x: auto;
            }
            
            table {
                font-size: 0.9rem;
            }
            
            th, td {
                padding: 12px;
            }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Stadtwerke & Kommunen Kontaktdaten</h1>
            <p class="subtitle">Professionelle Kontaktdatenbank für den deutschen Energiesektor</p>
        </header>
        
        <div class="controls">
            <button class="btn active" id="cardViewBtn">Kartenansicht</button>
            <button class="btn" id="tableViewBtn">Tabellenansicht</button>
            <button class="btn" id="downloadBtn">CSV Download</button>
        </div>
        
        <div id="cardView" class="card-grid"></div>
        <div id="tableView" class="table-container hidden"></div>
    </div>
    
    <script>
        let data = [];
        
        async function loadData() {
            const response = await fetch('data.csv');
            const csvText = await response.text();
            
            const lines = csvText.trim().split('\n');
            const headers = lines[0].split(',');
            
            data = lines.slice(1).map(line => {
                const values = line.split(',');
                const entry = {};
                headers.forEach((header, index) => {
                    entry[header] = values[index];
                });
                return entry;
            });
            
            renderCardView();
            renderTableView();
        }
        
        function renderCardView() {
            const container = document.getElementById('cardView');
            container.innerHTML = data.map(entry => `
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">${entry.Name}</h2>
                        <span class="card-type">${entry.Typ}</span>
                    </div>
                    <div class="card-info">
                        <span class="card-label">Adresse</span>
                        <div class="card-value">${entry.Straße}<br>${entry.PLZ} ${entry.Stadt}</div>
                    </div>
                    <div class="card-info">
                        <span class="card-label">Telefon</span>
                        <div class="card-value"><a href="tel:${entry.Telefon}">${entry.Telefon}</a></div>
                    </div>
                    <div class="card-info">
                        <span class="card-label">Email</span>
                        <div class="card-value"><a href="mailto:${entry.Email}">${entry.Email}</a></div>
                    </div>
                    <div class="card-info">
                        <span class="card-label">Website</span>
                        <div class="card-value"><a href="${entry.Website}" target="_blank">${entry.Website}</a></div>
                    </div>
                    <div class="card-info">
                        <span class="card-label">Geschäftsführer</span>
                        <div class="card-value">${entry.Geschäftsführer}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderTableView() {
            const container = document.getElementById('tableView');
            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Typ</th>
                            <th>Stadt</th>
                            <th>Telefon</th>
                            <th>Email</th>
                            <th>Website</th>
                            <th>Geschäftsführer</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.map(entry => `
                            <tr>
                                <td><strong>${entry.Name}</strong></td>
                                <td><span class="type-badge">${entry.Typ}</span></td>
                                <td>${entry.PLZ} ${entry.Stadt}</td>
                                <td><a href="tel:${entry.Telefon}">${entry.Telefon}</a></td>
                                <td><a href="mailto:${entry.Email}">${entry.Email}</a></td>
                                <td><a href="${entry.Website}" target="_blank">${entry.Website.replace('https://www.', '')}</a></td>
                                <td>${entry.Geschäftsführer}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        // View Switcher
        document.getElementById('cardViewBtn').addEventListener('click', () => {
            document.getElementById('cardView').classList.remove('hidden');
            document.getElementById('tableView').classList.add('hidden');
            document.getElementById('cardViewBtn').classList.add('active');
            document.getElementById('tableViewBtn').classList.remove('active');
        });
        
        document.getElementById('tableViewBtn').addEventListener('click', () => {
            document.getElementById('cardView').classList.add('hidden');
            document.getElementById('tableView').classList.remove('hidden');
            document.getElementById('cardViewBtn').classList.remove('active');
            document.getElementById('tableViewBtn').classList.add('active');
        });
        
        // CSV Download
        document.getElementById('downloadBtn').addEventListener('click', () => {
            window.location.href = 'data.csv';
        });
        
        // Load data on page load
        loadData();
    </script>
</body>
</html>
