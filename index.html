<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stadtwerke & Kommunen Kontaktdaten</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: #fafafa;
            color: #09090b;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }
        
        /* Header */
        header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: #09090b;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            font-size: 1rem;
            color: #71717a;
            font-weight: 400;
        }
        
        /* Controls */
        .controls {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 0.375rem;
            border: 1px solid #e4e4e7;
            background: #ffffff;
            color: #09090b;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        
        .btn:hover {
            background: #f4f4f5;
            border-color: #d4d4d8;
        }
        
        .btn.active {
            background: #18181b;
            color: #ffffff;
            border-color: #18181b;
        }
        
        /* Section */
        .section {
            margin-bottom: 3rem;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            color: #09090b;
        }
        
        .section-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.125rem 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: 9999px;
            background: #f4f4f5;
            color: #52525b;
        }
        
        /* Card Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }
        
        /* Card */
        .card {
            background: #ffffff;
            border: 1px solid #e4e4e7;
            border-radius: 0.5rem;
            padding: 1.5rem;
            transition: all 0.2s ease;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
        }
        
        .card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            border-color: #d4d4d8;
        }
        
        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: #09090b;
            margin-bottom: 1rem;
            letter-spacing: -0.025em;
        }
        
        .card-info {
            margin-bottom: 0.875rem;
        }
        
        .card-info:last-child {
            margin-bottom: 0;
        }
        
        .card-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
            display: block;
        }
        
        .card-value {
            font-size: 0.875rem;
            color: #09090b;
        }
        
        .card-value a {
            color: #09090b;
            text-decoration: none;
            transition: color 0.15s ease;
        }
        
        .card-value a:hover {
            color: #71717a;
        }
        
        /* Table */
        .table-wrapper {
            background: #ffffff;
            border: 1px solid #e4e4e7;
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: #fafafa;
            border-bottom: 1px solid #e4e4e7;
        }
        
        th {
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            color: #52525b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        td {
            padding: 1rem;
            font-size: 0.875rem;
            color: #09090b;
            border-bottom: 1px solid #f4f4f5;
        }
        
        tbody tr:hover {
            background: #fafafa;
        }
        
        tbody tr:last-child td {
            border-bottom: none;
        }
        
        table a {
            color: #09090b;
            text-decoration: none;
            transition: color 0.15s ease;
        }
        
        table a:hover {
            color: #71717a;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 2rem 1rem;
            }
            
            h1 {
                font-size: 1.875rem;
            }
            
            .section-title {
                font-size: 1.25rem;
            }
            
            .card-grid {
                grid-template-columns: 1fr;
            }
            
            .table-wrapper {
                overflow-x: auto;
            }
            
            table {
                font-size: 0.8125rem;
            }
            
            th, td {
                padding: 0.75rem;
            }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Stadtwerke & Kommunen Kontaktdaten</h1>
            <p class="subtitle">Professionelle Kontaktdatenbank für den deutschen Energiesektor</p>
        </header>
        
        <div class="controls">
            <button class="btn active" id="cardViewBtn">Kartenansicht</button>
            <button class="btn" id="tableViewBtn">Tabellenansicht</button>
            <button class="btn" id="downloadBtn">CSV Download</button>
        </div>
        
        <div id="cardView">
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Stadtwerke</h2>
                    <span class="section-badge" id="stadtwerkeCount"></span>
                </div>
                <div class="card-grid" id="stadtwerkeCards"></div>
            </div>
            
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Kommunen</h2>
                    <span class="section-badge" id="kommunenCount"></span>
                </div>
                <div class="card-grid" id="kommunenCards"></div>
            </div>
        </div>
        
        <div id="tableView" class="hidden">
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Stadtwerke</h2>
                    <span class="section-badge" id="stadtwerkeCountTable"></span>
                </div>
                <div class="table-wrapper" id="stadtwerkeTable"></div>
            </div>
            
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Kommunen</h2>
                    <span class="section-badge" id="kommunenCountTable"></span>
                </div>
                <div class="table-wrapper" id="kommunenTable"></div>
            </div>
        </div>
    </div>
    
    <script>
        let stadtwerke = [];
        let kommunen = [];
        
        async function loadData() {
            const response = await fetch('data.csv');
            const csvText = await response.text();
            
            const lines = csvText.trim().split('\n');
            const headers = lines[0].split(',');
            
            const allData = lines.slice(1).map(line => {
                const values = line.split(',');
                const entry = {};
                headers.forEach((header, index) => {
                    entry[header] = values[index];
                });
                return entry;
            });
            
            stadtwerke = allData.filter(e => e.Typ === 'Stadtwerke');
            kommunen = allData.filter(e => e.Typ === 'Kommune');
            
            renderCardView();
            renderTableView();
        }
        
        function renderCardView() {
            document.getElementById('stadtwerkeCount').textContent = stadtwerke.length;
            document.getElementById('stadtwerkeCards').innerHTML = stadtwerke.map(entry => `
                <div class="card">
                    <h3 class="card-title">${entry.Name}</h3>
                    <div class="card-info">
                        <span class="card-label">Adresse</span>
                        <div class="card-value">${entry.Straße}<br>${entry.PLZ} ${entry.Stadt}</div>
                    </div>
                    <div class="card-info">
                        <span class="card-label">Telefon</span>
                        <div class="card-value"><a href="tel:${entry.Telefon}">${entry.Telefon}</a></div>
                    </div>
                    <div class="card-info">
                        <span class="card-label">Email</span>
                        <div class="card-value"><a href="mailto:${entry.Email}">${entry.Email}</a></div>
                    </div>
                    <div class="card-info">
                        <span class="card-label">Website</span>
                        <div class="card-value"><a href="${entry.Website}" target="_blank">${entry.Website.replace('https://', '').replace('www.', '')}</a></div>
                    </div>
                    <div class="card-info">
                        <span class="card-label">Geschäftsführer</span>
                        <div class="card-value">${entry.Geschäftsführer}</div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('kommunenCount').textContent = kommunen.length;
            document.getElementById('kommunenCards').innerHTML = kommunen.map(entry => `
                <div class="card">
                    <h3 class="card-title">${entry.Name}</h3>
                    <div class="card-info">
                        <span class="card-label">Adresse</span>
                        <div class="card-value">${entry.Straße}<br>${entry.PLZ} ${entry.Stadt}</div>
                    </div>
                    <div class="card-info">
                        <span class="card-label">Telefon</span>
                        <div class="card-value"><a href="tel:${entry.Telefon}">${entry.Telefon}</a></div>
                    </div>
                    <div class="card-info">
                        <span class="card-label">Email</span>
                        <div class="card-value"><a href="mailto:${entry.Email}">${entry.Email}</a></div>
                    </div>
                    <div class="card-info">
                        <span class="card-label">Website</span>
                        <div class="card-value"><a href="${entry.Website}" target="_blank">${entry.Website.replace('https://', '').replace('www.', '')}</a></div>
                    </div>
                    <div class="card-info">
                        <span class="card-label">Geschäftsführer</span>
                        <div class="card-value">${entry.Geschäftsführer}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderTableView() {
            document.getElementById('stadtwerkeCountTable').textContent = stadtwerke.length;
            document.getElementById('stadtwerkeTable').innerHTML = createTable(stadtwerke);
            
            document.getElementById('kommunenCountTable').textContent = kommunen.length;
            document.getElementById('kommunenTable').innerHTML = createTable(kommunen);
        }
        
        function createTable(data) {
            return `
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Stadt</th>
                            <th>Telefon</th>
                            <th>Email</th>
                            <th>Website</th>
                            <th>Geschäftsführer</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.map(entry => `
                            <tr>
                                <td style="font-weight: 600;">${entry.Name}</td>
                                <td>${entry.PLZ} ${entry.Stadt}</td>
                                <td><a href="tel:${entry.Telefon}">${entry.Telefon}</a></td>
                                <td><a href="mailto:${entry.Email}">${entry.Email}</a></td>
                                <td><a href="${entry.Website}" target="_blank">${entry.Website.replace('https://', '').replace('www.', '')}</a></td>
                                <td>${entry.Geschäftsführer}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        document.getElementById('cardViewBtn').addEventListener('click', () => {
            document.getElementById('cardView').classList.remove('hidden');
            document.getElementById('tableView').classList.add('hidden');
            document.getElementById('cardViewBtn').classList.add('active');
            document.getElementById('tableViewBtn').classList.remove('active');
        });
        
        document.getElementById('tableViewBtn').addEventListener('click', () => {
            document.getElementById('cardView').classList.add('hidden');
            document.getElementById('tableView').classList.remove('hidden');
            document.getElementById('cardViewBtn').classList.remove('active');
            document.getElementById('tableViewBtn').classList.add('active');
        });
        
        document.getElementById('downloadBtn').addEventListener('click', () => {
            window.location.href = 'data.csv';
        });
        
        loadData();
    </script>
</body>
</html>
