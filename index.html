<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilities, Construction Offices & Cadastre Offices Contact Database</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fafafa;
            color: #09090b;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }
        
        header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: #09090b;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            font-size: 1rem;
            color: #71717a;
            font-weight: 400;
        }
        
        .controls {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 0.375rem;
            border: 1px solid #e4e4e7;
            background: #ffffff;
            color: #09090b;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        
        .btn:hover {
            background: #f4f4f5;
            border-color: #d4d4d8;
        }
        
        .btn.active {
            background: #18181b;
            color: #ffffff;
            border-color: #18181b;
        }
        
        .section {
            margin-bottom: 3rem;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            color: #09090b;
        }
        
        .section-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.125rem 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: 9999px;
            background: #f4f4f5;
            color: #52525b;
        }
        
        /* Card Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.5rem;
        }
        
        .card {
            background: #ffffff;
            border: 1px solid #e4e4e7;
            border-radius: 0.5rem;
            padding: 1.5rem;
            transition: all 0.2s ease;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }
        
        .card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #d4d4d8;
        }
        
        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: #09090b;
            margin-bottom: 1rem;
            letter-spacing: -0.025em;
        }
        
        .card-info {
            margin-bottom: 0.75rem;
        }
        
        .card-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
            display: block;
        }
        
        .card-value {
            font-size: 0.875rem;
            color: #09090b;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, monospace;
        }
        
        .card-value a {
            color: #09090b;
            text-decoration: none;
            transition: color 0.15s ease;
        }
        
        .card-value a:hover {
            color: #3b82f6;
        }
        
        /* Table - Professional Software Look */
        .table-wrapper {
            background: #ffffff;
            border: 1px solid #e4e4e7;
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        
        thead {
            background: #18181b;
            color: #fafafa;
        }
        
        th {
            padding: 0.875rem 1rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-right: 1px solid #27272a;
        }
        
        th:last-child {
            border-right: none;
        }
        
        /* Fixed column widths for uniform look */
        th:nth-child(1), td:nth-child(1) { width: 16%; } /* Name */
        th:nth-child(2), td:nth-child(2) { width: 12%; } /* Stadt */
        th:nth-child(3), td:nth-child(3) { width: 13%; } /* Telefon */
        th:nth-child(4), td:nth-child(4) { width: 20%; } /* Email */
        th:nth-child(5), td:nth-child(5) { width: 15%; } /* Website */
        th:nth-child(6), td:nth-child(6) { width: 24%; } /* Ansprechpartner */
        
        td {
            padding: 0.875rem 1rem;
            font-size: 0.8125rem;
            color: #09090b;
            border-bottom: 1px solid #f4f4f5;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        td:nth-child(1) {
            font-weight: 600;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        tbody tr {
            transition: background-color 0.1s ease;
        }
        
        tbody tr:hover {
            background: #fafafa;
        }
        
        tbody tr:last-child td {
            border-bottom: none;
        }
        
        table a {
            color: #3b82f6;
            text-decoration: none;
            transition: color 0.15s ease;
        }
        
        table a:hover {
            color: #2563eb;
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 2rem 1rem;
            }
            
            h1 {
                font-size: 1.875rem;
            }
            
            .card-grid {
                grid-template-columns: 1fr;
            }
            
            .table-wrapper {
                overflow-x: auto;
            }
            
            table {
                min-width: 1000px;
            }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Utilities, Construction Offices & Cadastre Offices</h1>
            <p class="subtitle">Professional contact database with direct decision-maker contacts</p>
        </header>
        
        <div class="controls">
            <button class="btn active" id="cardViewBtn">Card View</button>
            <button class="btn" id="tableViewBtn">Table View</button>
            <button class="btn" id="downloadBtn">CSV Download</button>
        </div>
        
        <div id="cardView">
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Utilities</h2>
                    <span class="section-badge" id="stadtwerkeCount"></span>
                </div>
                <div class="card-grid" id="stadtwerkeCards"></div>
            </div>
            
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Construction Offices</h2>
                    <span class="section-badge" id="bauaemterCount"></span>
                </div>
                <div class="card-grid" id="bauaemterCards"></div>
            </div>
            
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Cadastre Offices</h2>
                    <span class="section-badge" id="katasterCount"></span>
                </div>
                <div class="card-grid" id="katasterCards"></div>
            </div>
        </div>
        
        <div id="tableView" class="hidden">
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Utilities</h2>
                    <span class="section-badge" id="stadtwerkeCountTable"></span>
                </div>
                <div class="table-wrapper" id="stadtwerkeTable"></div>
            </div>
            
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Construction Offices</h2>
                    <span class="section-badge" id="bauaemterCountTable"></span>
                </div>
                <div class="table-wrapper" id="bauaemterTable"></div>
            </div>
            
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Cadastre Offices</h2>
                    <span class="section-badge" id="katasterCountTable"></span>
                </div>
                <div class="table-wrapper" id="katasterTable"></div>
            </div>
        </div>
    </div>
    
    <script>
        let stadtwerke = [];
        let bauaemter = [];
        let kataster = [];
        
        async function loadData() {
            const response = await fetch('data.csv');
            const csvText = await response.text();
            
            const lines = csvText.trim().split('\n');
            const headers = lines[0].split(',');
            
            const allData = lines.slice(1).map(line => {
                const values = line.split(',');
                const entry = {};
                headers.forEach((header, index) => {
                    entry[header] = values[index];
                });
                return entry;
            });
            
            stadtwerke = allData.filter(e => e.Typ === 'Stadtwerke');
            bauaemter = allData.filter(e => e.Typ === 'Bauamt');
            kataster = allData.filter(e => e.Typ === 'Katasteramt');
            
            renderCardView();
            renderTableView();
        }
        
        function renderCardView() {
            // Stadtwerke
            document.getElementById('stadtwerkeCount').textContent = stadtwerke.length;
            document.getElementById('stadtwerkeCards').innerHTML = stadtwerke.map(entry => createCard(entry)).join('');
            
            // Bauämter
            document.getElementById('bauaemterCount').textContent = bauaemter.length;
            document.getElementById('bauaemterCards').innerHTML = bauaemter.map(entry => createCard(entry)).join('');
            
            // Katasterämter
            document.getElementById('katasterCount').textContent = kataster.length;
            document.getElementById('katasterCards').innerHTML = kataster.map(entry => createCard(entry)).join('');
        }
        
        function createCard(entry) {
            return `
                <div class="card">
                    <h3 class="card-title">${entry.Name}</h3>
                    <div class="card-info">
                        <span class="card-label">Address</span>
                        <div class="card-value">${entry.Straße}<br>${entry.PLZ} ${entry.Stadt}</div>
                    </div>
                    <div class="card-info">
                        <span class="card-label">Phone</span>
                        <div class="card-value"><a href="tel:${entry.Telefon}">${entry.Telefon}</a></div>
                    </div>
                    <div class="card-info">
                        <span class="card-label">Email</span>
                        <div class="card-value"><a href="mailto:${entry.Email}">${entry.Email}</a></div>
                    </div>
                    <div class="card-info">
                        <span class="card-label">Website</span>
                        <div class="card-value"><a href="${entry.Website}" target="_blank">${entry.Website.replace('https://', '').replace('www.', '')}</a></div>
                    </div>
                    <div class="card-info">
                        <span class="card-label">Contact Person</span>
                        <div class="card-value">${entry.Ansprechpartner}</div>
                    </div>
                </div>
            `;
        }
        
        function renderTableView() {
            document.getElementById('stadtwerkeCountTable').textContent = stadtwerke.length;
            document.getElementById('stadtwerkeTable').innerHTML = createTable(stadtwerke);
            
            document.getElementById('bauaemterCountTable').textContent = bauaemter.length;
            document.getElementById('bauaemterTable').innerHTML = createTable(bauaemter);
            
            document.getElementById('katasterCountTable').textContent = kataster.length;
            document.getElementById('katasterTable').innerHTML = createTable(kataster);
        }
        
        function createTable(data) {
            return `
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>City</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Website</th>
                            <th>Contact Person</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.map(entry => `
                            <tr>
                                <td>${entry.Name}</td>
                                <td>${entry.PLZ} ${entry.Stadt}</td>
                                <td><a href="tel:${entry.Telefon}">${entry.Telefon}</a></td>
                                <td><a href="mailto:${entry.Email}">${entry.Email}</a></td>
                                <td><a href="${entry.Website}" target="_blank">${entry.Website.replace('https://', '').replace('www.', '')}</a></td>
                                <td>${entry.Ansprechpartner}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        document.getElementById('cardViewBtn').addEventListener('click', () => {
            document.getElementById('cardView').classList.remove('hidden');
            document.getElementById('tableView').classList.add('hidden');
            document.getElementById('cardViewBtn').classList.add('active');
            document.getElementById('tableViewBtn').classList.remove('active');
        });
        
        document.getElementById('tableViewBtn').addEventListener('click', () => {
            document.getElementById('cardView').classList.add('hidden');
            document.getElementById('tableView').classList.remove('hidden');
            document.getElementById('cardViewBtn').classList.remove('active');
            document.getElementById('tableViewBtn').classList.add('active');
        });
        
        document.getElementById('downloadBtn').addEventListener('click', () => {
            window.location.href = 'data.csv';
        });
        
        loadData();
    </script>
</body>
</html>
